<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Kaylee Xiao's Contact</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" href="../svglogo.svg" type="image/svg+xml">
        <link rel="stylesheet" href="../style.css">
    </head>
    <body>
        <header>
            <div class="top-bar">
                <h1><a href="../content.html">Kaylee Xiao</a></h1>

                <svg class="menu" viewBox="0 0 30 30" role="button">
                    <title>Navigation Menu Icon</title>
                    <line x1="8" x2="22" y1="12" y2="12" stroke-linecap="round" stroke-width="3"/>
                    <line x1="8" x2="22" y1="18" y2="18" stroke-linecap="round"stroke-width="3"/>
                    <line x1="8" x2="22" y1="24" y2="24" stroke-linecap="round"stroke-width="3"/>
                </svg>
            </div>

            <nav>
                <a href="about.html">About</a>
                <a href="education.html">Education</a>
                <a href="experience.html">Experiences</a>
                <a href="portfolio.html">Portfolio</a>
                <a href="contact.html" class="selected">Contact</a>
            </nav>
            
        </header>

        <main>
            <div class="cover">
                <h2 class="title">Contact</h2>

                <img class="background-image" src="../images/cover2-1500.webp" width="1500" height=auto alt="Me in Xinjiang" srcset="../images/cover2-1500.webp 1500w, ../images/cover2-1000.webp 1000w, ../images/cover2-500.webp 500w" sizes="(max-width: 500px) 500px, (max-width: 1000px) 1000px, 1500px">
            </div>

            <div class="container grid-layout">
                <img src="../images/contact-1500.webp" width="1500" height=auto alt="Me in Xinjiang 2" srcset="../images/contact-1500.webp 1500w, ../images/contact-1000.webp 1000w, ../images/contact-500.webp 500w" sizes="(max-width: 500px) 500px, (max-width: 1000px) 1000px, 1500px">

                <div class="text">
                    <h3>Contact Information</h3>

                    <div id="container-a">
                        <h4>Phone Number</h4>
                        <p>+1 646-345-7392</p>
                    </div>

                    <div id="container-b">
                        <h4>Email Address</h4>
                        <p>yx3544@nyu.edu</p>
                    </div>
                </div>
            </div>

            <div class="container2 grid-layout">
                <img src="../images/form-1500.webp" width="1500" height=auto alt="Me in Xinjiang 3" srcset="../images/form-1500.webp 1500w, ../images/form-1000.webp 1000w, ../images/form-500.webp 500w" sizes="(max-width: 500px) 500px, (max-width: 1000px) 1000px, 1500px">

                <div class="text">
                    <h3>Get in Touch</h3>

                    <form method="post" action="/submit-form" class="contact-form">
                        <div class="two-column">
                            <label>
                                First Name (required)
                                <input type="text" name="first-name" required>
                            </label>

                            <label>
                                Last Name (required)
                                <input type="text" name="last-name" required>
                            </label>
                        </div>

                        <label>
                            Email Address (required)
                            <input type="email" name="email" required>
                        </label>

                        <label>
                            Message (required)
                            <textarea name="message" cols="36" rows="6" placeholder="Enter your message here." required></textarea>
                        </label>

                        <button type="submit">Send</button>
                    </form>
                </div>
            </div>

        </main>

        <svg id="color-mode" viewBox="0 0 100 100" aria-label="Toggle color mode">
            <title>Toggle color mode</title>
            <path d="m50,0C22.39,0,0,22.39,0,50s22.39,50,50,50,50-22.39,50-50S77.61,0,50,0Zm0,94V6c24.26,0,44,19.74,44,44s-19.74,44-44,44Z"/>
        </svg>

        <footer>
            <div class="footer">
                <a href="../content.html">
                    <title>Go to Home Page</title>
                    <img src="../icon.png" alt="Kaylee Xiao Icon" id="icon">
                </a>
            </div>
        </footer>

        <script src="../script.js"></script>
    </body>
</html>
